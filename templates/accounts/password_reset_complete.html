{% extends "layouts/public.html" %}
{% load ui_tags %}

{% block title %}Senha redefinida — ServiçoPro{% endblock %}

{% block content %}
<div>
    <div class="mx-auto mb-6 flex h-12 w-12 items-center justify-center rounded-full bg-emerald-100">
        <svg class="w-6 h-6 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
        </svg>
    </div>

    <h2 class="text-2xl font-bold text-slate-900 mb-2 text-center">Senha redefinida com sucesso</h2>
    <p class="text-sm text-slate-600 text-center mb-8">
        Sua nova senha já está ativa. Use-a para entrar na sua conta.
    </p>

    <a href="{% url 'accounts:login' %}"
       class="w-full flex justify-center py-2.5 px-4 rounded-lg text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-600 transition-colors shadow-sm">
        Entrar agora
    </a>
</div>
{% endblock %}
