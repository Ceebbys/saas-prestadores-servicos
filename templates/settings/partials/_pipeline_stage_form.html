{% load ui_tags %}

<form method="post"
      hx-post="{{ request.path }}"
      hx-target="this"
      hx-swap="outerHTML"
      class="bg-white rounded-xl shadow-sm ring-1 ring-slate-200/60 p-6">
    {% csrf_token %}

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-4">
        {% form_field form.pipeline %}
        {% form_field form.name %}
        {% form_field form.order %}
        {% form_field form.color %}
    </div>

    <div class="mt-4 flex items-center gap-6">
        <label class="flex items-center gap-2 text-sm text-slate-700">
            {{ form.is_won }}
            <span>Etapa de ganho</span>
        </label>
        <label class="flex items-center gap-2 text-sm text-slate-700">
            {{ form.is_lost }}
            <span>Etapa de perda</span>
        </label>
    </div>

    <div class="flex items-center justify-end gap-3 mt-6 pt-4 border-t border-slate-200">
        <a href="{% url 'settings_app:pipeline_stages' %}"
           class="px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors">
            Cancelar
        </a>
        <button type="submit"
                class="px-6 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 transition-colors shadow-sm">
            {% if form.instance.pk %}Salvar{% else %}Criar{% endif %}
        </button>
    </div>
</form>
