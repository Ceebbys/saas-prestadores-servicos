{% extends "base.html" %}
{% load static ui_tags %}

{% block body %}
<div x-data="{ sidebarOpen: false }" class="min-h-full flex">

    <!-- Mobile Sidebar Overlay -->
    <div x-show="sidebarOpen" x-transition:enter="transition-opacity ease-linear duration-200"
         x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
         x-transition:leave="transition-opacity ease-linear duration-200"
         x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
         class="fixed inset-0 bg-slate-900/60 z-40 lg:hidden" @click="sidebarOpen = false">
    </div>

    <!-- Sidebar -->
    <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
           class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 transition-transform duration-200 ease-in-out lg:translate-x-0 lg:static lg:z-auto flex flex-col">
        {% include "components/_sidebar.html" %}
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-h-screen lg:ml-0">
        <!-- Top Bar -->
        {% include "components/_topbar.html" %}

        <!-- Page Content -->
        <main class="flex-1 p-6">
            <!-- Breadcrumb -->
            {% block breadcrumb %}{% endblock %}

            <!-- Page Header -->
            {% block page_header %}{% endblock %}

            <!-- Content -->
            {% block content %}{% endblock %}
        </main>
    </div>
</div>
{% endblock %}
