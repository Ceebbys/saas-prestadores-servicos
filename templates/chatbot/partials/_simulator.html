{% load ui_tags %}

<div class="bg-white rounded-xl shadow-sm ring-1 ring-slate-200/60 p-5">
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-semibold text-slate-700">Simulador</h3>
        <span class="text-xs text-slate-400">Preview do fluxo (via API)</span>
    </div>

    <!-- Phone frame -->
    <div x-data="chatSimulator()" class="mx-auto max-w-sm">
        <div class="bg-slate-800 rounded-[2rem] p-3 shadow-xl">
            <!-- Phone header -->
            <div class="bg-emerald-700 rounded-t-[1.25rem] px-4 py-3 flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-emerald-600 flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25Z" />
                    </svg>
                </div>
                <div>
                    <p class="text-sm font-medium text-white">{{ flow.name }}</p>
                    <p class="text-xs text-emerald-200" x-text="connected ? 'Online' : '{{ flow.get_channel_display }}'"></p>
                </div>
            </div>

            <!-- Chat area -->
            <div class="bg-[#e5ddd5] min-h-[360px] max-h-[400px] overflow-y-auto p-3 space-y-2" x-ref="chatArea">
                <template x-for="(msg, idx) in messages" :key="idx">
                    <div :class="msg.from === 'bot' ? 'flex justify-start' : 'flex justify-end'">
                        <div :class="msg.from === 'bot'
                            ? 'bg-white text-slate-800 rounded-r-xl rounded-bl-xl'
                            : 'bg-emerald-100 text-slate-800 rounded-l-xl rounded-br-xl'"
                             class="px-3 py-2 max-w-[85%] shadow-sm">
                            <p class="text-sm whitespace-pre-wrap" x-text="msg.text"></p>
                            <!-- Choice buttons -->
                            <template x-if="msg.choices && msg.choices.length > 0 && msg.active">
                                <div class="mt-2 space-y-1">
                                    <template x-for="(ch, ci) in msg.choices" :key="ci">
                                        <button @click="selectChoice(ch)"
                                                class="block w-full text-left px-2.5 py-1.5 text-xs font-medium text-emerald-700 bg-emerald-50 rounded-lg hover:bg-emerald-100 transition-colors border border-emerald-200"
                                                x-text="ch">
                                        </button>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- Typing indicator -->
                <div x-show="typing" class="flex justify-start">
                    <div class="bg-white rounded-r-xl rounded-bl-xl px-4 py-3 shadow-sm">
                        <div class="flex gap-1">
                            <div class="w-2 h-2 rounded-full bg-slate-400 animate-bounce" style="animation-delay: 0ms"></div>
                            <div class="w-2 h-2 rounded-full bg-slate-400 animate-bounce" style="animation-delay: 150ms"></div>
                            <div class="w-2 h-2 rounded-full bg-slate-400 animate-bounce" style="animation-delay: 300ms"></div>
                        </div>
                    </div>
                </div>

                <!-- Completion message -->
                <template x-if="completed">
                    <div class="space-y-2">
                        <div class="flex justify-center">
                            <div class="bg-emerald-50 text-emerald-700 rounded-xl px-4 py-2 text-xs font-medium shadow-sm border border-emerald-200">
                                <span x-show="leadId">&#10003; Lead criado com sucesso!</span>
                                <span x-show="!leadId">&#10003; Fluxo concluído</span>
                            </div>
                        </div>
                        <template x-if="leadId">
                            <div class="flex justify-center">
                                <a :href="'/leads/' + leadId + '/'"
                                   class="text-xs text-emerald-600 hover:text-emerald-800 underline">
                                    Ver lead criado
                                </a>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

            <!-- Input area -->
            <div class="bg-slate-100 rounded-b-[1.25rem] px-3 py-2">
                <template x-if="!started">
                    <button @click="start()"
                            class="w-full py-2.5 text-sm font-medium text-white bg-emerald-600 rounded-xl hover:bg-emerald-700 transition-colors">
                        Iniciar Simulação
                    </button>
                </template>
                <template x-if="started && !completed && !waitingChoice">
                    <form @submit.prevent="sendMessage()" class="flex items-center gap-2">
                        <input type="text" x-model="userInput" :placeholder="inputPlaceholder"
                               x-ref="input" :disabled="typing"
                               class="flex-1 rounded-full border-0 bg-white px-4 py-2 text-sm text-slate-900 ring-1 ring-slate-300 focus:ring-2 focus:ring-emerald-500">
                        <button type="submit" :disabled="!userInput.trim() || typing"
                                class="w-9 h-9 rounded-full bg-emerald-600 flex items-center justify-center hover:bg-emerald-700 transition-colors disabled:bg-slate-400">
                            <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
                            </svg>
                        </button>
                    </form>
                </template>
                <template x-if="completed">
                    <button @click="reset()"
                            class="w-full py-2.5 text-sm font-medium text-slate-600 bg-white rounded-xl hover:bg-slate-50 transition-colors ring-1 ring-slate-300">
                        Reiniciar Simulação
                    </button>
                </template>
                <template x-if="started && !completed && waitingChoice">
                    <p class="text-center text-xs text-slate-400 py-2">Selecione uma opção acima</p>
                </template>
            </div>
        </div>
    </div>
</div>

<script>
function chatSimulator() {
    const apiBase = '/chatbot/api/{{ flow.webhook_token }}';

    return {
        messages: [],
        userInput: '',
        started: false,
        completed: false,
        typing: false,
        waitingChoice: false,
        connected: false,
        sessionKey: null,
        leadId: null,
        inputPlaceholder: 'Digite sua resposta...',

        async start() {
            this.started = true;
            this.typing = true;

            try {
                const resp = await fetch(apiBase + '/start/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({channel: 'simulator'}),
                });
                const data = await resp.json();

                if (!resp.ok) {
                    this.typing = false;
                    this.addBotMessage(data.error || 'Erro ao iniciar. Verifique se o fluxo está ativo e possui passos.');
                    return;
                }

                this.sessionKey = data.session_key;
                this.connected = true;

                await this.delay(400);
                this.typing = false;
                this.addBotMessage(data.welcome_message);

                if (data.step) {
                    await this.delay(600);
                    this.showStep(data.step);
                }
            } catch (e) {
                this.typing = false;
                this.addBotMessage('Erro de conexão com a API.');
            }
        },

        async sendMessage() {
            const text = this.userInput.trim();
            if (!text || this.typing) return;
            this.userInput = '';
            this.addUserMessage(text);
            await this.processResponse(text);
        },

        async selectChoice(text) {
            this.messages.forEach(m => { if (m.active) m.active = false; });
            this.waitingChoice = false;
            this.addUserMessage(text);
            await this.processResponse(text);
        },

        async processResponse(text) {
            this.typing = true;
            this.scrollToBottom();

            try {
                const resp = await fetch(apiBase + '/respond/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        session_key: this.sessionKey,
                        response: text,
                    }),
                });
                const data = await resp.json();

                await this.delay(500 + Math.random() * 500);
                this.typing = false;

                if (data.error && data.message) {
                    this.addBotMessage(data.message);
                    if (data.step) {
                        this.showStep(data.step);
                    }
                    return;
                }

                if (data.is_complete) {
                    this.addBotMessage(data.message);
                    this.leadId = data.lead_id;
                    this.completed = true;
                    this.scrollToBottom();
                    return;
                }

                if (data.step) {
                    this.showStep(data.step);
                }
            } catch (e) {
                this.typing = false;
                this.addBotMessage('Erro de conexão.');
            }
        },

        showStep(step) {
            const placeholders = {
                email: 'seu@email.com',
                phone: '(11) 99999-0000',
                name: 'Seu nome completo',
                company: 'Nome da empresa',
                text: 'Digite sua resposta...',
                choice: 'Selecione uma opção acima',
            };
            this.inputPlaceholder = placeholders[step.type] || 'Digite sua resposta...';

            if (step.type === 'choice' && step.choices.length > 0) {
                this.waitingChoice = true;
                this.messages.push({
                    from: 'bot',
                    text: step.question,
                    choices: step.choices,
                    active: true,
                });
            } else {
                this.waitingChoice = false;
                this.addBotMessage(step.question);
                this.$nextTick(() => {
                    if (this.$refs.input) this.$refs.input.focus();
                });
            }
            this.scrollToBottom();
        },

        addBotMessage(text) {
            this.messages.push({ from: 'bot', text, choices: [], active: false });
            this.scrollToBottom();
        },

        addUserMessage(text) {
            this.messages.push({ from: 'user', text });
            this.scrollToBottom();
        },

        scrollToBottom() {
            this.$nextTick(() => {
                if (this.$refs.chatArea) {
                    this.$refs.chatArea.scrollTop = this.$refs.chatArea.scrollHeight;
                }
            });
        },

        delay(ms) {
            return new Promise(r => setTimeout(r, ms));
        },

        reset() {
            this.messages = [];
            this.userInput = '';
            this.started = false;
            this.completed = false;
            this.typing = false;
            this.waitingChoice = false;
            this.connected = false;
            this.sessionKey = null;
            this.leadId = null;
            this.inputPlaceholder = 'Digite sua resposta...';
        }
    };
}
</script>
