{# Delete confirmation modal content #}
{# Variables: object_name, delete_url, target (htmx target after deletion) #}

<div class="fixed inset-0 z-50 overflow-y-auto" aria-modal="true">
    <div id="modal-backdrop" class="modal-backdrop fixed inset-0 bg-slate-900/60"></div>
    <div class="flex min-h-full items-center justify-center p-4">
        <div class="modal-panel relative w-full max-w-sm rounded-2xl bg-white shadow-2xl p-6 text-center" @click.stop="">
            <div class="w-12 h-12 rounded-full bg-rose-100 flex items-center justify-center mx-auto mb-4">
                <svg class="w-6 h-6 text-rose-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                </svg>
            </div>
            <h3 class="text-lg font-semibold text-slate-900 mb-2">Excluir registro</h3>
            <p class="text-sm text-slate-500 mb-6">
                Tem certeza que deseja excluir <strong>{{ object_name }}</strong>? Esta ação não pode ser desfeita.
            </p>
            <div class="flex items-center justify-center gap-3">
                <button onclick="closeModal()"
                        class="px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors">
                    Cancelar
                </button>
                <form method="post" action="{{ delete_url }}">
                    {% csrf_token %}
                    <button type="submit"
                            class="px-4 py-2 text-sm font-medium text-white bg-rose-600 rounded-lg hover:bg-rose-700 transition-colors">
                        Excluir
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
