<div class="mb-4">
    <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-slate-700 mb-1.5">
        {{ label|default:field.label }}
        {% if field.field.required %}<span class="text-rose-500">*</span>{% endif %}
    </label>
    {{ field }}
    {% if field.errors %}
    <p class="mt-1 text-sm text-rose-600">{{ field.errors.0 }}</p>
    {% endif %}
    {% if field.help_text %}
    <p class="mt-1 text-xs text-slate-400">{{ field.help_text }}</p>
    {% endif %}
</div>
