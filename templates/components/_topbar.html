{% load ui_tags %}

<header class="sticky top-0 z-30 flex items-center justify-between h-16 px-6 bg-white border-b border-slate-200">
    <!-- Left: Mobile menu + Page title -->
    <div class="flex items-center gap-4">
        <button @click="sidebarOpen = !sidebarOpen" class="lg:hidden text-slate-500 hover:text-slate-700">
            {% icon "bars-3" "w-6 h-6" %}
        </button>
        <h1 class="text-lg font-semibold text-slate-800">
            {% block page_title %}{% endblock %}
        </h1>
    </div>

    <!-- Right: Actions -->
    <div class="flex items-center gap-4">
        <!-- Global Search -->
        <div class="hidden md:block relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                {% icon "search" "w-4 h-4 text-slate-400" %}
            </div>
            <input type="text"
                   placeholder="Buscar..."
                   class="block w-64 rounded-lg border-0 py-1.5 pl-10 pr-3 text-sm text-slate-900 ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600">
        </div>

        <!-- Notifications -->
        <div x-data="{
                open: false,
                unread: {{ notifications_unread_count|default:0 }},
                loaded: false,
            }"
             @click.outside="open = false"
             @v2b:notification:new.window="unread = unread + 1; loaded = false;"
             class="relative">
            <button @click="open = !open; if (open && !loaded) { htmx.trigger($refs.dropdown, 'refresh'); loaded = true; }"
                    class="relative text-slate-400 hover:text-slate-600 transition-colors p-1.5 rounded-lg hover:bg-slate-100"
                    aria-label="Notificações">
                {% icon "bell" "w-5 h-5" %}
                <span x-show="unread > 0"
                      x-cloak
                      class="absolute -top-0.5 -right-0.5 min-w-[18px] h-[18px] px-1 rounded-full bg-rose-500 text-white text-[10px] font-bold flex items-center justify-center">
                    <span x-text="unread > 99 ? '99+' : unread"></span>
                </span>
            </button>
            <div x-show="open"
                 x-transition:enter="transition ease-out duration-100"
                 x-transition:enter-start="transform opacity-0 scale-95"
                 x-transition:enter-end="transform opacity-100 scale-100"
                 x-transition:leave="transition ease-in duration-75"
                 x-transition:leave-start="transform opacity-100 scale-100"
                 x-transition:leave-end="transform opacity-0 scale-95"
                 x-ref="dropdown"
                 hx-get="{% url 'communications:notification_dropdown' %}"
                 hx-trigger="refresh from:closest div, v2b:notification:new from:body throttle:1s"
                 hx-swap="innerHTML"
                 class="absolute right-0 mt-2 w-80 rounded-xl bg-white shadow-lg ring-1 ring-slate-200 z-50 overflow-hidden"
                 style="display: none;">
                <div class="px-4 py-10 text-center text-sm text-slate-400">
                    Carregando…
                </div>
            </div>
        </div>

        <!-- User Menu -->
        <div x-data="{ open: false }" class="relative">
            <button @click="open = !open" @click.outside="open = false"
                    class="flex items-center gap-2 text-sm hover:bg-slate-50 rounded-lg px-2 py-1.5 transition-colors">
                {% if user.avatar %}
                <img src="{{ user.avatar.url }}" alt="" class="w-8 h-8 rounded-full object-cover">
                {% else %}
                <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs font-bold">
                    {{ user.initials }}
                </div>
                {% endif %}
                <span class="hidden sm:block text-sm font-medium text-slate-700">{{ user.first_name_display }}</span>
                <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
                </svg>
            </button>

            <!-- Dropdown -->
            <div x-show="open"
                 x-transition:enter="transition ease-out duration-100"
                 x-transition:enter-start="transform opacity-0 scale-95"
                 x-transition:enter-end="transform opacity-100 scale-100"
                 x-transition:leave="transition ease-in duration-75"
                 x-transition:leave-start="transform opacity-100 scale-100"
                 x-transition:leave-end="transform opacity-0 scale-95"
                 class="absolute right-0 mt-2 w-56 rounded-xl bg-white shadow-lg ring-1 ring-slate-200 py-1 z-50">

                <div class="px-4 py-3 border-b border-slate-100">
                    <p class="text-sm font-medium text-slate-900">{{ user.full_name }}</p>
                    <p class="text-xs text-slate-500 truncate">{{ user.email }}</p>
                </div>

                {% if current_empresa %}
                <div class="px-4 py-2 border-b border-slate-100">
                    <p class="text-xs text-slate-400">Empresa</p>
                    <p class="text-sm text-slate-700 font-medium">{{ current_empresa.name }}</p>
                </div>
                {% endif %}

                <a href="{% url 'settings_app:index' %}" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">
                    Configurações
                </a>

                <div class="border-t border-slate-100 mt-1">
                    <a href="{% url 'accounts:logout' %}" class="block px-4 py-2 text-sm text-rose-600 hover:bg-rose-50">
                        Sair
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>
