# Nginx config para servicos.cebs-server.cloud — HTTP (Gunicorn) + WS (Daphne).
#
# Faz proxy de:
#   /static/   → arquivos staticos
#   /media/    → arquivos de mídia
#   /ws/*      → Daphne (ASGI, WebSocket) na porta 8002
#   tudo mais  → Gunicorn (WSGI, HTTP) na porta 8001
#
# Aplicar (uma vez):
#   sudo cp deploy/nginx-servicos.conf /etc/nginx/sites-available/servicos
#   sudo nginx -t && sudo systemctl reload nginx

server {
    server_name servicos.cebs-server.cloud;

    client_max_body_size 25M;

    location /static/ {
        alias /opt/saas-prestadores/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /opt/saas-prestadores/media/;
        expires 7d;
        access_log off;
    }

    # === WebSocket via Daphne (porta 8002) ===
    # Recebe /ws/inbox/ e /ws/notifications/ definidos em apps/communications/routing.py
    location /ws/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket = conexões longas; timeout generoso (4h)
        proxy_read_timeout 14400s;
        proxy_send_timeout 14400s;
        proxy_buffering off;
    }

    # === HTTP via Gunicorn (porta 8001) ===
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/servicos.cebs-server.cloud/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/servicos.cebs-server.cloud/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = servicos.cebs-server.cloud) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name servicos.cebs-server.cloud;
    return 404; # managed by Certbot
}
